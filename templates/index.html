<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Linha do Tempo</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/cytoscape/3.26.0/cytoscape.min.js"></script>
    <link rel="stylesheet" href="./static/base.css">
</head>
<body>
    <div class="scroll-wrapper">
        {% for epoch in epochs %}
        <div class="epoch-line" style="left: {{ epoch.x }}px;"></div>
        <div class="epoch-label" style="left: {{ epoch.x }}px;">{{ epoch.label }} ({{ epoch.year }})</div>
        {% endfor %}
        <div id="cy" style="width: {{ total_width }}px;"></div>
    </div>

    <script id="elements-data" type="application/json">
        {{ elements_json | safe }}
    </script>

    <script>
        var rawData = document.getElementById('elements-data').textContent;
        var elements = JSON.parse(rawData);

        var cy = cytoscape({
            container: document.getElementById('cy'),
            elements: elements,
            zoomingEnabled: false,
            panningEnabled: false,
            boxSelectionEnabled: false,
            autoungrabify: true,
            autounselectify: true,

            style: [
                {
                    selector: 'node',
                    style: {
                        'shape': 'round-rectangle',
                        'width': 'data(width)',
                        'height': 5,
                        'background-color': 'rgba(138, 180, 248, 0.05)',
                        'border-width': 1,
                        'border-color': 'rgba(138, 180, 248, 0.4)',
                        'label': 'data(id)',
                        'color': '#8ab4f8', 
                        'font-size': '25px',
                        'text-margin-y': '10px',
                        'text-valign': 'bottom',
                        'text-halign': 'center',
                        'font-family': 'monospace',
                        'text-color': '#000000'
                    }
                },
                {
                    selector: 'edge',
                    style: {
                        'width': 5,
                        'line-color': 'data(targetColor)',
                        'target-arrow-color': 'data(targetColor)',
                        'target-arrow-shape': 'none',
                        'curve-style': 'taxi', 
                        'taxi-direction': 'rightward',
                        'taxi-radius': 30, 
                        'edge-distances': 'node-position'
                    }
                }
            ],
            layout: {
                name: 'preset' 
            }
        });
    </script>
</body>
</html>
